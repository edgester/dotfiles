---
- name: Set up my Linux environment
  hosts: localhost

  vars:
    gh_cli_version: 1.4.0
    gh_cli_url: "https://github.com/cli/cli/releases/download/v{{ gh_cli_version }}/gh_{{ gh_cli_version }}_linux_amd64.deb"
    HOME: "{{ lookup('env', 'HOME') }}"
    download_folder: "{{ HOME }}/Downloads"
    gh_cli_download_file: "{{ download_folder }}/gh_{{ gh_cli_version }}_linux_amd64.deb"

  roles:
    - role: skype
      become: true

  tasks:
    - name: Add the flathub flatpak repository remote to the user installation
      community.general.flatpak_remote:
        name: flathub
        state: present
        flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo
        method: user

    - name: Install kiwix flatpak in my homedir
      community.general.flatpak:
        name: org.kiwix.desktop
        method: user
        state: present

    - name: Add a symlink for kiwix
      file:
        src: ~/.local/share/flatpak/exports/bin/org.kiwix.desktop
        path: ~/.local/bin/kiwix
        state: link

    - name: Install zeal flatpak
      community.general.flatpak:
        name: org.zealdocs.Zeal
        method: system
        state: present
      become: true

    - name: Add a symlink for zeal
      file:
        src: /var/lib/flatpak/app/org.zealdocs.Zeal/x86_64/stable/8aaaa499f0438d08c39868a9e4ca6d0031c6dda851a6a4d3c474a871dd12f6f3/export/bin/org.zealdocs.Zeal
        path: ~/.local/bin/zeal
        state: link

    - name: Install apt packages
      apt:
        name: "{{ item }}"
        state: present
      become: true
      loop:
        - golang
        - jq
        - rclone
        - thunderbird

    - block:
      - name: Download gh-cli
        uri:
          url: "{{ gh_cli_url }}"
          creates: "{{ gh_cli_download_file }}"
          dest: "{{ gh_cli_download_file }}"
      - name: Install gh-cli
        apt:
          deb: "{{ gh_cli_download_file }}"
        become: true
      when: ansible_distribution == 'Ubuntu'
